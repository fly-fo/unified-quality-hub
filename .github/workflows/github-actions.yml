name: Unified Quality Hub - GitHub Actions

on:
  workflow_dispatch:
    inputs:
      ALLURE_JOB_RUN_ID:
        description: "Allure TestOps service parameter. Leave blank."
        required: false
        type: string
        default: ""

      ALLURE_USERNAME:
        description: "Allure TestOps service parameter. Leave blank."
        required: false
        type: string
        default: ""

      release:
        description: "Release"
        required: true
        type: string
        default: "33.3.1"

      browser:
        description: "Browser"
        required: true
        type: choice
        options:
          - Chrome
          - Firefox
          - Safari
        default: Chrome

      os:
        description: "OS"
        required: true
        type: choice
        options:
          - macOS
          - Windows
          - Linux
        default: macOS

      test_scope:
        description: "Test scope"
        required: true
        type: choice
        options:
          - all
          - unit
          - api
          - e2e
        default: all

jobs:
  run-tests:
    name: Run ${{ inputs.test_scope }} tests

    runs-on: ubuntu-latest

    container:
      image: mcr.microsoft.com/playwright:v1.54.1-noble

    env:
      ALLURE_RESULTS: "allure-results"

      ALLURE_JOB_RUN_ID: "${{ github.event.inputs.ALLURE_JOB_RUN_ID }}"
      ALLURE_USERNAME: "${{ github.event.inputs.ALLURE_USERNAME }}"

      ALLURE_LAUNCH_NAME: "Unified Quality Hub - GitHub Actions - ${{ inputs.test_scope }} - #${{ github.run_number }}"
      ALLURE_LAUNCH_TAGS: "github-actions,playwright-bdd,${{ inputs.test_scope }}"

      RELEASE: "${{ inputs.release }}"
      BROWSER: "${{ inputs.browser }}"
      OS: "${{ inputs.os }}"

      DEMO_FLAKY_MODE: "on"
      DEMO_FLAKY_RATE: "0.5"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Install and configure allurectl
        uses: allure-framework/setup-allurectl@v1
        with:
          allure-endpoint: "https://demo.testops.cloud"
          allure-project-id: "4601"
          allure-token: "${{ secrets.ALLURE_TOKEN }}"

      - name: Clean previous test results
        run: |
          rm -rf allure-results playwright-report test-results

      - name: Run selected tests
        shell: bash
        run: |
          case "${{ inputs.test_scope }}" in
            unit)
              allurectl watch --results allure-results -- npm run test:unit
              ;;
            api)
              allurectl watch --results allure-results -- npm run test:api
              ;;
            e2e)
              allurectl watch --results allure-results -- npm run test:e2e
              ;;
            all)
              allurectl watch --results allure-results -- npm run test
              ;;
            *)
              echo "Unsupported test scope: ${{ inputs.test_scope }}"
              exit 1
              ;;
          esac

      - name: Show Allure result files
        if: always()
        run: |
          echo "Allure result files:"
          ls -la allure-results || true
          find allure-results -type f | head -50 || true

      - name: Prepare artifact directories
        if: always()
        run: |
          mkdir -p allure-results playwright-report test-results
          touch allure-results/.keep
          touch playwright-report/.keep
          touch test-results/.keep

      - name: Upload test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-artifacts-${{ inputs.test_scope }}-${{ github.run_number }}
          path: |
            allure-results/
            playwright-report/
            test-results/
          retention-days: 7
          if-no-files-found: warn
