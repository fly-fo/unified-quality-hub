spec:
  inputs:
    release:
      type: string
      default: "33.3.1"
      description: "Release"
    browser:
      type: string
      default: "Chrome"
      description: "Browser"
    os:
      type: string
      default: "macOS"
      description: "OS"
    test_scope:
      type: string
      default: "all"
      description: "Test scope: all, unit, api, e2e"

---
stages:
  - test

default:
  image: mcr.microsoft.com/playwright:v1.54.1-noble

variables:
  ALLURE_ENDPOINT: "https://demo.testops.cloud"
  ALLURE_PROJECT_ID: "4601"
  ALLURE_RESULTS: "allure-results"
  ALLURE_LAUNCH_NAME: "Unified Quality Hub - GitLab - $[[ inputs.test_scope ]] - #${CI_PIPELINE_ID}"
  ALLURE_LAUNCH_TAGS: "gitlab, playwright-bdd, $[[ inputs.test_scope ]]"
  RELEASE: "$[[ inputs.release ]]"
  BROWSER: "$[[ inputs.browser ]]"
  OS: "$[[ inputs.os ]]"
  DEMO_FLAKY_MODE: "on"
  DEMO_FLAKY_RATE: "0.5"

cache:
  paths:
    - node_modules/

test_all:
  stage: test

  script:
    - npm install
    - npm install -D allure-playwright
    - curl -Lo allurectl https://github.com/allure-framework/allurectl/releases/latest/download/allurectl_linux_amd64
    - chmod +x allurectl

    - echo "Clean old results"
    - rm -rf allure-results playwright-report test-results
    - mkdir -p allure-results

    - echo "Generate BDD tests"
    - npx bddgen

    - echo "Run Playwright and generate Allure results"
    - |
      if [ "$[[ inputs.test_scope ]]" = "unit" ]; then
        ./allurectl watch --results allure-results -- npx playwright test --config=playwright.config.ts features/unit
      elif [ "$[[ inputs.test_scope ]]" = "api" ]; then
        ./allurectl watch --results allure-results -- npx playwright test --config=playwright.config.ts features/api
      elif [ "$[[ inputs.test_scope ]]" = "e2e" ]; then
        ./allurectl watch --results allure-results -- npx playwright test --config=playwright.config.ts features/e2e
      else
        ./allurectl watch --results allure-results -- npx playwright test --config=playwright.config.ts
      fi

    - echo "Check Allure result files"
    - ls -la allure-results || true
    - find allure-results -type f | head -50 || true

  after_script:
    - mkdir -p allure-results playwright-report test-results
    - touch allure-results/.keep
    - touch playwright-report/.keep
    - touch test-results/.keep

  artifacts:
    when: always
    paths:
      - allure-results/
      - playwright-report/
      - test-results/
    expire_in: 1 week