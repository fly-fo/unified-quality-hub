name: Unified Quality Hub

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  run-tests:
    runs-on: ubuntu-latest

    env:
      ALLURE_ENDPOINT: https://demo.testops.cloud
      ALLURE_PROJECT_ID: "4601"
      ALLURE_RESULTS: allure-results
      ALLURE_LAUNCH_NAME: GitHub Actions - Unified Quality Hub
      ALLURE_LAUNCH_TAGS: github-actions,playwright

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Install allurectl
        run: |
          curl -fsSL \
            https://github.com/allure-framework/allurectl/releases/latest/download/allurectl_linux_amd64 \
            -o allurectl
          chmod +x allurectl

      - name: Run Playwright tests
        env:
          ALLURE_TOKEN: ${{ secrets.ALLURE_TOKEN }}
        run: |
          ./allurectl watch -- npm test
